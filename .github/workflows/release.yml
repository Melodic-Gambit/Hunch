name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v5.4.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build
        run: .\build.ps1
        shell: pwsh

      - name: Read version
        id: version
        run: |
          $v = (Get-Content version.txt -Raw).Trim()
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "Hunch v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            dist/Hunch_v${{ steps.version.outputs.version }}.zip
            dist/Hunch_v${{ steps.version.outputs.version }}_portable.zip
            dist/Hunch_v${{ steps.version.outputs.version }}_installer.exe
